<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ミッション開始</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@600&family=Oswald:wght@329&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sawarabi+Mincho&family=Yuji+Mai&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/ress.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/mission.css" />
        <script src="js/mission.js" defer></script>
    </head>
    <body>
        <header>
            <h1>MISSION MALL</h1>
        </header>
        <main>
            <div class="commander">
                <div class="commander_text">
                    <p>その調子で任務を遂行しろ！！</p>
                </div>
                <picture class="commander_img">
                    <img src="img/commander_img.svg" alt="" />
                </picture>
            </div>
            <div class="mission">
                <section class="mission_text">
                    <h2>ミッション</h2>
                </section>
                <ul class="mission_list_wrapper">
                    <!-- <li class="mission_list_wrap">
                        <div class="mission_list mission_complete">
                            <p>5pt</p>
                            <p>相手に帽子をかぶらせろ</p>
                        </div>
                        <div class="change_btn">
                            <img src="img/arrow_icon.svg" alt="" />
                        </div>
                    </li> -->
                </ul>
            </div>
            <div class="card">
                <section class="card_top">
                    <h2>MISSION MALL IDCard</h2>
                </section>
                <div class="character_box">
                    <div class="character_name">
                        <section class="name">
                            <p>Name：</p>
                            <h3>とわほそかわ</h3>
                        </section>
                        <section class="point">
                            <p>Point：</p>
                            <h3><span>10</span> pt</h3>
                        </section>
                        <section class="max_score">
                            <p>scoring the first：</p>
                            <h3><span>20</span> pt</h3>
                        </section>
                    </div>
                    <picture class="character_img">
                        <img src="img/card_icon.svg" alt="" />
                    </picture>
                </div>
            </div>
        </main>
    </body>
</html>
