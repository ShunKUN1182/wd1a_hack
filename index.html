<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mission Mall</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@600&family=Oswald:wght@329&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sawarabi+Mincho&family=Yuji+Mai&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/ress.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/index.css" />
        <script src="js/index.js" defer></script>
    </head>
    <body>
        <main>
            <div class="logo_wrap">
                <h1 class="spotlight_wrap">
                    <img src="img/logo.png" alt="" class="logo_white">
                    <span class="spotlight"></span>
                    <img src="img/logo_black.png" alt="" class="logo_black">
                </h1>
            </div>
            <div class="mode_select">
                <section>
                    <h2>モード選択</h2>
                </section>
                <div class="btn_wrap">
                    <a href="mission.html" class="btn">ポイント先取</a>
                    <a href="mission.html" class="btn">時間制限</a>
                    <a href="#" class="rule">遊び方はこちら</a>
                </div>
            </div>
            <div class="modal">
                <div class="modal_bg">
                    <div class="grid_icons">
                        <input type="radio" name="icon" id="icon1" checked />
                        <label for="icon1">
                            <img src="img/chara_icon1.png" alt="" />
                        </label>
                        <input type="radio" name="icon" id="icon2" />
                        <label for="icon2">
                            <img src="img/chara_icon2.png" alt="" />
                        </label>
                        <input type="radio" name="icon" id="icon3" />
                        <label for="icon3">
                            <img src="img/chara_icon3.png" alt="" />
                        </label>
                        <input type="radio" name="icon" id="icon4" />
                        <label for="icon4">
                            <img src="img/chara_icon4.png" alt="" />
                        </label>
                    </div>
                    <input type="text" placeholder="コードネーム" id="codeName" />
                    <div class="btns">
                        <a href="roomset.html" class="room_btn">ルーム作成</a>
                        <a href="roomset.html" class="room_btn">ルーム参加</a>
                    </div>
                    <div class="back_btn">
                        <a href="#" id="backBtn"> 戻る </a>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
